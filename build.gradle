plugins {
    id 'java'
    id 'application'
}

group = 'com.mi.simulacion'
version = '1.0'

repositories {
    mavenCentral()
    maven { url "https://oss.sonatype.org/content/repositories/snapshots/" }
    maven { url "https://oss.sonatype.org/content/repositories/releases/" }
}

// CORRECCIÓN 1: Configuración de Java dentro del bloque 'java'
java {
    sourceCompatibility = '21' // Usa '17', no '1.17'
    targetCompatibility = '21'
}

// CORRECCIÓN 2: Configuración de la aplicación dentro del bloque 'application'
application {
    mainClass = 'Launcher' // 'mainClassName' está obsoleto, ahora es 'mainClass'
}

ext {
    gdxVersion = '1.12.1'
}

dependencies {
    implementation "com.badlogicgames.gdx:gdx:$gdxVersion"
    implementation "com.badlogicgames.gdx:gdx-backend-lwjgl3:$gdxVersion"
    implementation "com.badlogicgames.gdx:gdx-platform:$gdxVersion:natives-desktop"
}